<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login/Signup - Knowzilla</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        /* same styles as original login.html */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; text-decoration: none; list-style: none; }
        /* ... (copy all styles from original) ... */
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(90deg, #333, #555); }
        /* full styles omitted for brevity, paste from original */
    </style>
</head>
<body>
    <div class="container">
        <div class="form-box login">
            <form action="/process" method="POST" id="loginForm">
                <h1>Login</h1>
                <div class="input-box">
                    <input placeholder="Registration No" name="registration_no" required type="text"/>
                    <i class="bx bxs-user"></i>
                </div>
                <div class="input-box">
                    <input placeholder="Password" name="password" required type="password"/>
                    <i class="bx bxs-lock-alt"></i>
                </div>
                <button class="btn" type="submit" name="login">Login</button>
            </form>
        </div>
        <div class="form-box register">
            <form action="/process" method="POST" id="registerForm">
                <h1>Registration</h1>
                <div class="input-box">
                    <input placeholder="Name" name="name" required type="text"/>
                    <i class="bx bxs-user"></i>
                </div>
                <div class="input-box">
                    <input placeholder="Registration No" name="registration_no" required type="text"/>
                    <i class="bx bxs-id-card"></i>
                </div>
                <div class="input-box">
                    <input placeholder="Email" name="email" required type="email"/>
                    <i class="bx bxs-envelope"></i>
                </div>
                <div class="input-box">
                    <input placeholder="Phone No" name="phone_no" required type="text"/>
                    <i class="bx bxs-phone"></i>
                </div>
                <div class="input-box">
                    <input placeholder="Class" name="class" required type="text"/>
                    <i class="bx bxs-school"></i>
                </div>
                <div class="input-box">
                    <input placeholder="Password" name="password" required type="password"/>
                    <i class="bx bxs-lock-alt"></i>
                </div>
                <button class="btn" type="submit" name="signup">Register</button>
            </form>
        </div>
        <!-- toggle boxes same -->
    </div>
    <script>
        // same toggle script
    </script>
</body>
</html>
