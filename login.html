<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login/Signup Form</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
            text-decoration: none;
            list-style: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(90deg, #333, #555);
        }

        .container {
            position: relative;
            width: 850px;
            height: 650px;
            background: #1a1a1a;
            margin: 20px;
            border-radius: 30px;
            box-shadow: 0 0 30px rgba(0, 0, 0, .2);
            overflow: hidden;
        }

        .container h1 {
            font-size: 36px;
            margin: -10px 0;
            color: #fff;
        }

        .container p {
            font-size: 14.5px;
            margin: 15px 0;
            color: #aaa;
        }

        form {
            width: 100%;
        }

        .form-box {
            position: absolute;
            right: 0;
            width: 50%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            color: #fff;
            text-align: center;
            padding: 40px;
            z-index: 1;
            transition: .6s ease-in-out 1.2s, visibility 0s 1s;
        }

        .container.active .form-box {
            right: 50%;
        }

        .form-box.register {
            visibility: hidden;
        }

        .container.active .form-box.register {
            visibility: visible;
        }

        .input-box {
            position: relative;
            margin: 20px 0;
        }

        .input-box input {
            width: 100%;
            padding: 13px 50px 13px 20px;
            background: #333;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 16px;
            color: #fff;
            font-weight: 500;
        }

        .input-box input::placeholder {
            color: #888;
            font-weight: 400;
        }

        .input-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #888;
        }

        .forgot-link {
            margin: -15px 0 15px;
        }

        .forgot-link a {
            font-size: 14.5px;
            color: #aaa;
        }

        .btn {
            width: 100%;
            height: 48px;
            background: #555;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .1);
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #fff;
            font-weight: 600;
            position: relative;
            transition: all 0.3s ease;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: linear-gradient(45deg, #ff6b6b, #f06595, #cc5de8, #845ef7, #5c7cfa, #339af0, #22b8cf, #20c997, #51cf66, #94d82d, #fcc419, #ff922b);
            background-size: 400%;
            z-index: -1;
            filter: blur(10px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .btn:hover::before {
            opacity: 1;
        }

        .btn:hover {
            transform: translateY(-3px);
        }

        .toggle-box {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .toggle-box::before {
            content: '';
            position: absolute;
            left: -250%;
            width: 300%;
            height: 100%;
            background: #555;
            border-radius: 150px;
            z-index: 2;
            transition: 1.8s ease-in-out;
        }

        .container.active .toggle-box::before {
            left: 50%;
        }

        .toggle-panel {
            position: absolute;
            width: 50%;
            height: 100%;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
            transition: .6s ease-in-out;
        }

        .toggle-panel.toggle-left {
            left: 0;
            transition-delay: 1.2s;
        }

        .container.active .toggle-panel.toggle-left {
            left: -50%;
            transition-delay: .6s;
        }

        .toggle-panel.toggle-right {
            right: -50%;
            transition-delay: .6s;
        }

        .container.active .toggle-panel.toggle-right {
            right: 0;
            transition-delay: 1.2s;
        }

        .toggle-panel p {
            margin-bottom: 20px;
        }

        .toggle-panel .btn {
            width: 160px;
            height: 46px;
            background: transparent;
            border: 2px solid #fff;
            box-shadow: none;
        }

        .success-message {
            display: none;
            color: #4caf50;
            margin-top: 10px;
        }

        .show-message {
            display: block;
        }

        @media screen and (max-width: 650px) {
            .container {
                height: calc(100vh - 40px);
            }

            .form-box {
                bottom: 0;
                width: 100%;
                height: 70%;
            }

            .container.active .form-box {
                right: 0;
                bottom: 30%;
            }

            .toggle-box::before {
                left: 0;
                top: -270%;
                width: 100%;
                height: 300%;
                border-radius: 20vw;
            }

            .container.active .toggle-box::before {
                left: 0;
                top: 70%;
            }

            .container.active .toggle-panel.toggle-left {
                left: 0;
                top: -30%;
            }

            .toggle-panel {
                width: 100%;
                height: 30%;
            }

            .toggle-panel.toggle-left {
                top: 0;
            }

            .toggle-panel.toggle-right {
                right: 0;
                bottom: -30%;
            }

            .container.active .toggle-panel.toggle-right {
                bottom: 0;
            }
        }

        @media screen and (max-width: 400px) {
            .form-box {
                padding: 20px;
            }

            .toggle-panel h1 {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-box login">

            <form id="loginForm">
                <h1>Login</h1>
                <div class="input-box">
                    <input placeholder="Registration No" name="registration_no" id="login-reg" required type="text"/>
                    <i class="bx bxs-user"></i>
                </div>
                <div class="input-box">
                    <input placeholder="Password" name="password" id="login-pass" required type="password"/>
                    <i class="bx bxs-lock-alt"></i>
                </div>
                <div class="forgot-link">
                    <a href="#">Forgot Password?</a>
                </div>
                <button class="btn" type="submit" id="login-submit">Login</button>
            </form>
        </div>
        <div class="form-box register">
            <form id="registerForm" >
                <h1>Registration</h1>
                <div class="input-box">
                    <input placeholder="Name" name="name" id="reg-name" required type="text"/>
                    <i class="bx bxs-user"></i>
                </div>
                <div class="input-box">
                    <input placeholder="Registration No" name="registration_no" id="reg-reg" required type="text"/>
                    <i class="bx bxs-id-card"></i>
                </div>
                <div class="input-box">
                    <input placeholder="Email" name="email" id="reg-email" required type="email"/>
                    <i class="bx bxs-envelope"></i>
                </div>
                <div class="input-box">
                    <input placeholder="Phone No" name="phone_no" id="reg-phone" required type="text"/>
                    <i class="bx bxs-phone"></i>
                </div>
                <div class="input-box">
                    <input placeholder="Class" name="class" id="reg-class" required type="text"/>
                    <i class="bx bxs-school"></i>
                </div>
                <div class="input-box">
                    <input placeholder="Password" name="password" id="reg-pass" required type="password"/>
                    <i class="bx bxs-lock-alt"></i>
                </div>
                <button class="btn" type="submit" id="register-submit">Register</button>
                <p class="success-message" id="successMessage">Successfully registered!</p>
            </form>
        </div>
        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <a href="https://imgbb.com/"><img src="https://i.ibb.co/SDyQBz4N/logo.png" alt="logo" border="0" width="100px"></a>
                <h1>Welcome Back!</h1>
                <p>Don't have an account?</p>
                <button class="btn register-btn">Register</button>
            </div>
            <div class="toggle-panel toggle-right">
                <a href="https://imgbb.com/"><img src="https://i.ibb.co/SDyQBz4N/logo.png" alt="logo" border="0" width="100px"></a>
                <h1>Hello, Welcome!</h1>
                <p>Already have an account?</p>
                <button class="btn login-btn">Login</button>
            </div>
        </div>
    </div>

    <script>
        const container = document.querySelector('.container');
        const registerBtn = document.querySelector('.register-btn');
        const loginBtn = document.querySelector('.login-btn');

        registerBtn.addEventListener('click', () => {
            container.classList.add('active');
        });

        loginBtn.addEventListener('click', () => {
            container.classList.remove('active');
        });

// Check for error params on load
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('error') === 'invalid') {
    alert('Invalid login credentials. Please check your registration number and password.');
} else if (urlParams.get('error') === 'duplicate') {
    alert('Registration number or email already exists.');
} else if (urlParams.get('error') === 'unknown') {
    alert('An unknown error occurred. Please try again.');
}

// API Submit Handlers - with credentials for session cookies
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if (res.redirected) {
                    window.location.href = res.url;
                } else {
                    alert('Login failed');
                }
            } catch (err) {
                alert('Network error: ' + err.message);
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if (res.redirected) {
                    window.location.href = res.url;
                } else {
                    alert('Registration failed');
                }
            } catch (err) {
                alert('Network error: ' + err.message);
            }
        });
    </script>

</body>
</html>
